<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anteiku - Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-main: #0a0a0c;
            --bg-panel: #14141a;
            --text-primary: #e0e0e0;
            --text-muted: #adb5bd;
            --accent-red: #8f0e0e;
            --accent-red-glow: #ff3c3c;
            --accent-coffee: #c7a17a;
            --border-color: #2a2a35;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Roboto Mono', monospace;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        .brand-logo {
            font-family: 'Cinzel', serif;
            color: var(--accent-coffee);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 20px 0;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .brand-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(143, 14, 14, 0.5);
        }

        .nav-link {
            color: var(--text-muted);
            padding: 15px 25px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            font-family: 'Cinzel', serif;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.02);
        }

        .nav-link.active {
            color: var(--accent-red-glow);
            border-left-color: var(--accent-red);
            background: linear-gradient(90deg, rgba(143, 14, 14, 0.1) 0%, transparent 100%);
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Стили для главного экрана */
        .welcome-title {
            font-size: 4rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(199, 161, 122, 0.3);
        }

        .welcome-subtitle {
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 40px auto;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .quick-links .btn-anteiku {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: 'Cinzel', serif;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.1rem;
            text-decoration: none;
            display: inline-block;
        }

        .quick-links .btn-anteiku:hover {
            border-color: var(--accent-red);
            color: var(--accent-red-glow);
            box-shadow: 0 0 15px rgba(143, 14, 14, 0.3);
            transform: translateY(-3px);
        }

        .quote {
            font-style: italic;
            margin-top: 60px;
            color: #5a5a66;
            font-size: 0.9rem;
        }

        /* Единый стиль логотипа для всех страниц */
        .logo-link {
            text-decoration: none !important;
            display: block;
            transition: all 0.3s ease;
        }

        .brand-logo {
            font-family: 'Cinzel', serif;
            /* Принудительно задаем шрифт */
            font-size: 1.8rem;
            font-weight: 700;
            /* Жирный шрифт */
            color: var(--accent-red) !important;
            text-shadow: 0 0 10px rgba(143, 14, 14, 0.5);
            margin: 0;
            line-height: 1.2;
        }

        .logo-link:hover .brand-logo {
            color: var(--accent-red-glow) !important;
            text-shadow: 0 0 20px var(--accent-red-glow);
            transform: scale(1.02);
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div>
                    <div class="brand-section pt-3">
                        <a href="/" class="logo-link">
                            <div class="brand-logo">☕ ANTEIKU</div>
                        </a>
                        <small class="text-muted">Система управления</small>
                    </div>
                    <ul class="nav flex-column mt-4">
                        <li class="nav-item"><a class="nav-link" href="/inventory.html">📦 Склад</a></li>
                        <li class="nav-item"><a class="nav-link" href="/menu.html">📜 Меню</a></li>
                        <li class="nav-item"><a class="nav-link" href="/orders.html">🔔 Заказы</a></li>
                        <li class="nav-item"><a class="nav-link" href="/reports.html">📈 Отчеты</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <h1 class="welcome-title">ANTEIKU</h1>
                <p class="welcome-subtitle">
                    Внутренняя сеть управления кофейней. Доступ разрешен только для авторизованного персонала 20-го
                    района.
                </p>

                <div class="quick-links">
                    <a href="/orders.html" class="btn-anteiku">Принять заказ</a>
                    <a href="/inventory.html" class="btn-anteiku">Проверить запасы</a>
                </div>

                <p class="quote">«Мы всего лишь хотим жить... как и вы.»</p>
            </main>
        </div>
    </div>

</body>

</html>
